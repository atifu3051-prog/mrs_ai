name: Build Flutter APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Clean and Get Dependencies
      run: |
        flutter clean
        flutter pub get

    - name: Force Build APK Without Validation
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxPermSize=512m" || cd .. && flutter build apk --debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mrs-ai-debug-apk
        path: build/app/outputs/flutter-apk/app-debug.apk
